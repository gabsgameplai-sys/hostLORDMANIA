<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LordMania Bot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- LADO ESQUERDO -->
  <div class="left">
    <img 
      id="skin"
      class="skin"
      src="https://crafatar.com/renders/body/Steve?overlay=true"
      onerror="this.src='https://minotar.net/body/Steve/200.png'"
    >
  </div>

  <!-- LADO DIREITO -->
  <div class="right">

    <div class="header">
      <h2>🤖 LordMania Bot</h2>
    </div>

    <div id="chat" class="chat">
      <div class="bot-msg">
        Olá! Eu sou o bot do servidor 😎<br>
        Use /help para ver comandos.
      </div>
    </div>

    <div class="input-area">
      <input id="msg" placeholder="Digite aqui..." 
        onkeypress="if(event.key==='Enter') send()">
      <button onclick="send()">➤</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
